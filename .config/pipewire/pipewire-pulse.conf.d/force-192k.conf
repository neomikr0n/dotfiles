pulse.rules = [
    {
        matches = [ { application.name = "~.*" } ]
        actions = {
            update-props = {
                # Forzamos al cliente a resamplear ANTES de llegar al motor
                audio.rate = 192000
                # Bloqueamos el buffer para que no sea errático
                node.latency = 2048/192000
                node.force-rate = 192000
                node.force-quantum = 2048
            }
        }
    }
]
